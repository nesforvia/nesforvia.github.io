{% extends 'base.html' %}{% block title %}News{% endblock %}{% block content %}<h1>News</h1><section class="news-list">{% for n in news %}<article>{% if n.image %}<img class="news-img" src="{{ url_for('static', filename=n.image) }}">{% endif %}<h2>{{ n.title }}</h2><p class="meta">{{ n.created_at }} — {{ n.author }}</p><p>{{ n.body }}</p></article>{% else %}<p>No news yet.</p>{% endfor %}</section>{% endblock %}
